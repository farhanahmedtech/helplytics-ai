"use client";

import { useState, useEffect, useCallback } from "react";
import { getProfile, updateProfile } from "@/config/dbFunctions";
import { toast } from "sonner";
import {
    User,
    Mail,
    MapPin,
    Award,
    Star,
    Edit2,
    Save,
    X,
    Briefcase,
    Heart,
    Globe,
    Calendar,
    TrendingUp,
    Shield,
    CheckCircle,
    Loader2,
    Plus,
    Trash2,
    Camera,
    Linkedin,
    Github,
    Twitter
} from "lucide-react";

export default function ProfilePage() {
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [isEditing, setIsEditing] = useState(false);
    const [profile, setProfile] = useState<any>(null);
    const [formData, setFormData] = useState({
        skills: [] as string[],
        interests: [] as string[],
        location: "",
        bio: "",
        socialLinks: {
            linkedin: "",
            github: "",
            twitter: ""
        }
    });
    const [skillInput, setSkillInput] = useState("");
    const [interestInput, setInterestInput] = useState("");
    const [activeTab, setActiveTab] = useState("overview");

    useEffect(() => {
        fetchProfile();
    }, []);

    const fetchProfile = async () => {
        setLoading(true);
        try {
            const res = await getProfile();
            if (res.success) {
                setProfile(res.data);
                setFormData({
                    skills: res.data.skills || [],
                    interests: res.data.interests || [],
                    location: res.data.location || "",
                    bio: res.data.bio || "",
                    socialLinks: res.data.socialLinks || { linkedin: "", github: "", twitter: "" }
                });
            }
        } catch (error: any) {
            toast.error(error?.message || "Failed to fetch profile");
        } finally {
            setLoading(false);
        }
    };

    const addSkill = () => {
        if (skillInput && !formData.skills.includes(skillInput)) {
            setFormData({ ...formData, skills: [...formData.skills, skillInput] });
            setSkillInput("");
            toast.success("Skill added");
        }
    };

    const removeSkill = (skill: string) => {
        setFormData({ ...formData, skills: formData.skills.filter(s => s !== skill) });
        toast.success("Skill removed");
    };

    const addInterest = () => {
        if (interestInput && !formData.interests.includes(interestInput)) {
            setFormData({ ...formData, interests: [...formData.interests, interestInput] });
            setInterestInput("");
            toast.success("Interest added");
        }
    };

    const removeInterest = (interest: string) => {
        setFormData({ ...formData, interests: formData.interests.filter(i => i !== interest) });
        toast.success("Interest removed");
    };

    const handleSave = async () => {
        setSaving(true);
        try {
            const res = await updateProfile(formData);
            if (res.success) {
                toast.success("Profile updated successfully!");
                setProfile(res.data);
                setIsEditing(false);
                // Re-fetch to ensure latest data
                await fetchProfile();
            } else {
                toast.error(res.message || "Failed to update profile");
            }
        } catch (error: any) {
            toast.error(error?.message || "Something went wrong");
        } finally {
            setSaving(false);
        }
    };

    const getLevel = (trustScore: number) => {
        if (trustScore >= 80) return { name: "Expert", color: "from-purple-600 to-pink-600", icon: <Award className="w-4 h-4" /> };
        if (trustScore >= 60) return { name: "Advanced", color: "from-blue-600 to-cyan-600", icon: <TrendingUp className="w-4 h-4" /> };
        if (trustScore >= 40) return { name: "Intermediate", color: "from-green-600 to-emerald-600", icon: <Star className="w-4 h-4" /> };
        return { name: "Beginner", color: "from-gray-600 to-slate-600", icon: <Shield className="w-4 h-4" /> };
    };

    const level = getLevel(profile?.trustScore || 0);

    if (loading) {
        return (
            <div className="flex flex-col items-center justify-center min-h-[60vh]">
                <Loader2 className="w-8 h-8 text-purple-600 animate-spin mb-3" />
                <p className="text-sm text-gray-500">Loading profile...</p>
            </div>
        );
    }

    return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-purple-50/20 pb-10">
            {/* Hero Section */}
            <div className="bg-gradient-to-r from-purple-600 via-purple-500 to-blue-600 text-white">
                <div className="max-w-7xl mx-auto px-4 py-8">
                    <div className="flex items-center gap-3 mb-2">
                        <User className="w-6 h-6" />
                        <h1 className="text-2xl font-bold">My Profile</h1>
                    </div>
                    <p className="text-white/80 text-sm">Manage your personal information and preferences</p>
                </div>
            </div>

            <div className="max-w-7xl mx-auto px-4 py-6">
                <div className="flex flex-col lg:flex-row gap-6">
                    {/* Sidebar */}
                    <div className="lg:w-80 space-y-4">
                        {/* Profile Card */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                            <div className="relative inline-block">
                                <div className="w-24 h-24 rounded-full bg-gradient-to-r from-purple-500 to-blue-500 flex items-center justify-center text-white text-3xl font-bold mx-auto shadow-lg">
                                    {profile?.name?.charAt(0) || "U"}
                                </div>
                                <button className="absolute bottom-0 right-0 p-1.5 bg-white rounded-full shadow-md hover:bg-gray-50">
                                    <Camera className="w-3.5 h-3.5 text-gray-600" />
                                </button>
                            </div>
                            <h2 className="text-xl font-bold text-gray-900 mt-3">{profile?.name}</h2>
                            <p className="text-sm text-gray-500">{profile?.email}</p>
                            <div className="mt-3 inline-flex items-center gap-1 px-3 py-1 bg-gray-100 rounded-full text-xs">
                                <Shield className="w-3 h-3 text-purple-600" />
                                <span>Member since {new Date(profile?.createdAt).getFullYear()}</span>
                            </div>
                        </div>

                        {/* Trust Score Card */}
                        <div className="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-2xl p-5 border border-yellow-100">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-r from-yellow-500 to-orange-500 flex items-center justify-center">
                                    <Star className="w-5 h-5 text-white" />
                                </div>
                                <div>
                                    <h3 className="font-semibold text-gray-900">Trust Score</h3>
                                    <p className="text-2xl font-bold text-gray-900">{profile?.trustScore}</p>
                                </div>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2 mb-3">
                                <div className="bg-gradient-to-r from-yellow-500 to-orange-500 h-2 rounded-full transition-all duration-500" style={{ width: `${profile?.trustScore}%` }} />
                            </div>
                            <div className={`inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium bg-gradient-to-r ${level.color} text-white`}>
                                {level.icon}
                                {level.name}
                            </div>
                            <p className="text-xs text-gray-500 mt-3">Help others to increase your trust score!</p>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1">
                        {/* Tabs */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="border-b border-gray-100 px-6">
                                <div className="flex gap-6 overflow-x-auto">
                                    {["overview", "skills", "interests", "social"].map((tab) => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`py-3 text-sm font-medium transition-colors relative ${activeTab === tab ? "text-purple-600" : "text-gray-500 hover:text-gray-700"
                                                }`}
                                        >
                                            {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                            {activeTab === tab && (
                                                <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-purple-600 rounded-full" />
                                            )}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="p-6">
                                {/* Overview Tab */}
                                {activeTab === "overview" && (
                                    <div className="space-y-6">
                                        {/* Basic Info */}
                                        <div>
                                            <div className="flex items-center gap-2 mb-4">
                                                <User className="w-4 h-4 text-purple-600" />
                                                <h3 className="font-semibold text-gray-900">Basic Information</h3>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs text-gray-500 mb-1">Full Name</label>
                                                    <p className="text-gray-900 font-medium">{profile?.name}</p>
                                                </div>
                                                <div>
                                                    <label className="block text-xs text-gray-500 mb-1">Email Address</label>
                                                    <p className="text-gray-900 font-medium">{profile?.email}</p>
                                                </div>
                                                <div>
                                                    <label className="block text-xs text-gray-500 mb-1">Location</label>
                                                    <p className="text-gray-900">{profile?.location || "Not specified"}</p>
                                                </div>
                                                <div>
                                                    <label className="block text-xs text-gray-500 mb-1">Member Since</label>
                                                    <p className="text-gray-900">{new Date(profile?.createdAt).toLocaleDateString()}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Bio */}
                                        {profile?.bio && (
                                            <div>
                                                <h3 className="font-semibold text-gray-900 mb-2">About Me</h3>
                                                <p className="text-gray-600 text-sm">{profile?.bio}</p>
                                            </div>
                                        )}

                                        {/* Skills Preview */}
                                        <div>
                                            <h3 className="font-semibold text-gray-900 mb-2">Skills</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {profile?.skills?.slice(0, 5).map((skill: string) => (
                                                    <span key={skill} className="px-2 py-1 bg-green-100 text-green-700 rounded-lg text-xs">
                                                        {skill}
                                                    </span>
                                                ))}
                                                {profile?.skills?.length > 5 && (
                                                    <span className="px-2 py-1 bg-gray-100 text-gray-600 rounded-lg text-xs">
                                                        +{profile.skills.length - 5} more
                                                    </span>
                                                )}
                                                {(!profile?.skills || profile.skills.length === 0) && (
                                                    <p className="text-gray-400 text-sm">No skills added yet</p>
                                                )}
                                            </div>
                                        </div>

                                        {/* Edit Button */}
                                        <button
                                            onClick={() => setIsEditing(true)}
                                            className="inline-flex items-center gap-2 px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700 transition"
                                        >
                                            <Edit2 className="w-4 h-4" />
                                            Edit Profile
                                        </button>
                                    </div>
                                )}

                                {/* Skills Tab */}
                                {activeTab === "skills" && (
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-semibold text-gray-900">Your Skills</h3>
                                            {!isEditing && (
                                                <button onClick={() => setIsEditing(true)} className="text-purple-600 text-sm">
                                                    Edit Skills
                                                </button>
                                            )}
                                        </div>

                                        {isEditing ? (
                                            <>
                                                <div className="flex gap-2 mb-4">
                                                    <input
                                                        type="text"
                                                        value={skillInput}
                                                        onChange={(e) => setSkillInput(e.target.value)}
                                                        onKeyPress={(e) => e.key === 'Enter' && addSkill()}
                                                        placeholder="Add a skill (e.g., JavaScript, React)"
                                                        className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                                                    />
                                                    <button
                                                        onClick={addSkill}
                                                        className="px-3 py-2 bg-purple-600 text-white rounded-lg text-sm"
                                                    >
                                                        <Plus className="w-4 h-4" />
                                                    </button>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {formData.skills.map(skill => (
                                                        <span key={skill} className="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-green-100 text-green-700 rounded-lg text-sm">
                                                            {skill}
                                                            <button onClick={() => removeSkill(skill)} className="hover:text-red-600">
                                                                <X className="w-3 h-3" />
                                                            </button>
                                                        </span>
                                                    ))}
                                                    {formData.skills.length === 0 && (
                                                        <p className="text-gray-400 text-sm">No skills added yet. Add your first skill above.</p>
                                                    )}
                                                </div>
                                            </>
                                        ) : (
                                            <div className="flex flex-wrap gap-2">
                                                {profile?.skills?.map((skill: string) => (
                                                    <span key={skill} className="px-3 py-1.5 bg-green-100 text-green-700 rounded-lg text-sm">
                                                        {skill}
                                                    </span>
                                                ))}
                                                {(!profile?.skills || profile.skills.length === 0) && (
                                                    <p className="text-gray-400 text-sm">No skills added yet</p>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Interests Tab */}
                                {activeTab === "interests" && (
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-semibold text-gray-900">Your Interests</h3>
                                            {!isEditing && (
                                                <button onClick={() => setIsEditing(true)} className="text-purple-600 text-sm">
                                                    Edit Interests
                                                </button>
                                            )}
                                        </div>

                                        {isEditing ? (
                                            <>
                                                <div className="flex gap-2 mb-4">
                                                    <input
                                                        type="text"
                                                        value={interestInput}
                                                        onChange={(e) => setInterestInput(e.target.value)}
                                                        onKeyPress={(e) => e.key === 'Enter' && addInterest()}
                                                        placeholder="Add an interest (e.g., Web Dev, AI)"
                                                        className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                                                    />
                                                    <button
                                                        onClick={addInterest}
                                                        className="px-3 py-2 bg-purple-600 text-white rounded-lg text-sm"
                                                    >
                                                        <Plus className="w-4 h-4" />
                                                    </button>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {formData.interests.map(interest => (
                                                        <span key={interest} className="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-sm">
                                                            {interest}
                                                            <button onClick={() => removeInterest(interest)} className="hover:text-red-600">
                                                                <X className="w-3 h-3" />
                                                            </button>
                                                        </span>
                                                    ))}
                                                    {formData.interests.length === 0 && (
                                                        <p className="text-gray-400 text-sm">No interests added yet. Add your first interest above.</p>
                                                    )}
                                                </div>
                                            </>
                                        ) : (
                                            <div className="flex flex-wrap gap-2">
                                                {profile?.interests?.map((interest: string) => (
                                                    <span key={interest} className="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-sm">
                                                        {interest}
                                                    </span>
                                                ))}
                                                {(!profile?.interests || profile.interests.length === 0) && (
                                                    <p className="text-gray-400 text-sm">No interests added yet</p>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Social Tab */}
                                {activeTab === "social" && (
                                    <div>
                                        <h3 className="font-semibold text-gray-900 mb-4">Social Links</h3>
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-3">
                                                <Linkedin className="w-5 h-5 text-blue-600" />
                                                <input
                                                    type="url"
                                                    value={formData.socialLinks.linkedin}
                                                    onChange={(e) => setFormData({
                                                        ...formData,
                                                        socialLinks: { ...formData.socialLinks, linkedin: e.target.value }
                                                    })}
                                                    placeholder="LinkedIn URL"
                                                    disabled={!isEditing}
                                                    className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 disabled:bg-gray-50"
                                                />
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <Github className="w-5 h-5 text-gray-800" />
                                                <input
                                                    type="url"
                                                    value={formData.socialLinks.github}
                                                    onChange={(e) => setFormData({
                                                        ...formData,
                                                        socialLinks: { ...formData.socialLinks, github: e.target.value }
                                                    })}
                                                    placeholder="GitHub URL"
                                                    disabled={!isEditing}
                                                    className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 disabled:bg-gray-50"
                                                />
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <Twitter className="w-5 h-5 text-sky-500" />
                                                <input
                                                    type="url"
                                                    value={formData.socialLinks.twitter}
                                                    onChange={(e) => setFormData({
                                                        ...formData,
                                                        socialLinks: { ...formData.socialLinks, twitter: e.target.value }
                                                    })}
                                                    placeholder="Twitter URL"
                                                    disabled={!isEditing}
                                                    className="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-purple-500 disabled:bg-gray-50"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Save/Cancel Buttons (when editing) */}
                                {isEditing && (
                                    <div className="flex gap-3 mt-6 pt-4 border-t border-gray-100">
                                        <button
                                            onClick={() => setIsEditing(false)}
                                            className="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            onClick={handleSave}
                                            disabled={saving}
                                            className="flex-1 py-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-lg font-medium text-sm flex items-center justify-center gap-2"
                                        >
                                            {saving ? (
                                                <>
                                                    <Loader2 className="w-4 h-4 animate-spin" />
                                                    Saving...
                                                </>
                                            ) : (
                                                <>
                                                    <Save className="w-4 h-4" />
                                                    Save Changes
                                                </>
                                            )}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Activity Timeline */}
                        <div className="mt-6 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                            <h3 className="font-semibold text-gray-900 mb-4 flex items-center gap-2">
                                <Calendar className="w-4 h-4 text-purple-600" />
                                Recent Activity
                            </h3>
                            <div className="space-y-3">
                                <div className="flex items-center gap-3 text-sm text-gray-500">
                                    <div className="w-2 h-2 bg-green-500 rounded-full" />
                                    <span>Last active: {new Date(profile?.lastActive || profile?.updatedAt).toLocaleDateString()}</span>
                                </div>
                                <div className="flex items-center gap-3 text-sm text-gray-500">
                                    <div className="w-2 h-2 bg-purple-500 rounded-full" />
                                    <span>Profile last updated: {new Date(profile?.updatedAt).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}