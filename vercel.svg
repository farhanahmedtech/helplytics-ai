"use client";

import { useState, useEffect } from "react";
import { useParams, useRouter } from "next/navigation";
import { getRequestById, offerHelp, markAsSolved, acceptHelper, declineHelper, sendMessage } from "@/config/dbFunctions";
import { toast } from "sonner";
import {
    User,
    MapPin,
    Star,
    Clock,
    Tag,
    MessageCircle,
    CheckCircle,
    Users,
    Sparkles,
    Award,
    Shield,
    Calendar,
    AlertCircle,
    ThumbsUp,
    ThumbsDown,
    Send,
    Phone,
    Mail,
    Linkedin,
    Github,
    Globe,
    MoreVertical,
    Check,
    X,
    UserPlus,
    UserMinus,
    Flag,
    Share2,
    Bookmark,
    Heart
} from "lucide-react";

export default function RequestDetailPage() {
    const { id } = useParams();
    const router = useRouter();
    const [loading, setLoading] = useState(true);
    const [request, setRequest] = useState<any>(null);
    const [offering, setOffering] = useState(false);
    const [solving, setSolving] = useState(false);
    const [accepting, setAccepting] = useState<string | null>(null);
    const [declining, setDeclining] = useState<string | null>(null);
    const [userInfo, setUserInfo] = useState<any>(null);
    const [showMessageModal, setShowMessageModal] = useState(false);
    const [messageText, setMessageText] = useState("");
    const [sendingMessage, setSendingMessage] = useState(false);
    const [showShareMenu, setShowShareMenu] = useState(false);
    const [isSaved, setIsSaved] = useState(false);

    useEffect(() => {
        const stored = localStorage.getItem("userInfo");
        if (stored) {
            setUserInfo(JSON.parse(stored));
        }
        fetchRequest();
    }, [id]);

    const fetchRequest = async () => {
        setLoading(true);
        try {
            const res = await getRequestById(id as string);
            if (res.success) {
                setRequest(res.data);
            } else {
                toast.error("Request not found");
                router.push("/explore");
            }
        } catch (error: any) {
            toast.error(error?.message || "Failed to fetch request");
        } finally {
            setLoading(false);
        }
    };

    const handleOfferHelp = async () => {
        setOffering(true);
        try {
            const res = await offerHelp(id as string);
            if (res.success) {
                toast.success("Help offer sent! The requester will review your application.");
                fetchRequest();
            } else {
                toast.error(res.message || "Failed to offer help");
            }
        } catch (error: any) {
            toast.error(error?.message || "Something went wrong");
        } finally {
            setOffering(false);
        }
    };

    const handleAcceptHelper = async (helperId: string, helperName: string) => {
        setAccepting(helperId);
        try {
            const res = await acceptHelper(id as string, helperId);
            if (res.success) {
                toast.success(`${helperName} has been accepted to help!`);
                fetchRequest();

                // Send notification to helper
                await sendMessage({
                    requestId: id as string,
                    to: helperId,
                    message: `🎉 Congratulations! Your help offer has been accepted for "${request.title}". Start collaborating now!`
                });
            } else {
                toast.error(res.message || "Failed to accept helper");
            }
        } catch (error: any) {
            toast.error(error?.message || "Something went wrong");
        } finally {
            setAccepting(null);
        }
    };

    const handleDeclineHelper = async (helperId: string, helperName: string) => {
        setDeclining(helperId);
        try {
            const res = await declineHelper(id as string, helperId);
            if (res.success) {
                toast.info(`${helperName} has been declined.`);
                fetchRequest();

                // Send notification to helper
                await sendMessage({
                    requestId: id as string,
                    to: helperId,
                    message: `Thank you for your interest in "${request.title}". The requester has chosen another helper this time. Keep helping others!`
                });
            } else {
                toast.error(res.message || "Failed to decline helper");
            }
        } catch (error: any) {
            toast.error(error?.message || "Something went wrong");
        } finally {
            setDeclining(null);
        }
    };

    const handleMarkSolved = async () => {
        setSolving(true);
        try {
            const res = await markAsSolved(id as string);
            if (res.success) {
                toast.success("Request marked as solved! Thank you for using Helplytics AI.");
                fetchRequest();
            } else {
                toast.error(res.message || "Failed to mark as solved");
            }
        } catch (error: any) {
            toast.error(error?.message || "Something went wrong");
        } finally {
            setSolving(false);
        }
    };

    const handleSendMessage = async () => {
        if (!messageText.trim()) return;

        setSendingMessage(true);
        try {
            const res = await sendMessage({
                requestId: id as string,
                to: request.createdBy?._id,
                message: messageText
            });
            if (res.success) {
                toast.success("Message sent!");
                setMessageText("");
                setShowMessageModal(false);
            }
        } catch (error: any) {
            toast.error("Failed to send message");
        } finally {
            setSendingMessage(false);
        }
    };

    const handleShare = () => {
        const url = window.location.href;
        navigator.clipboard.writeText(url);
        toast.success("Link copied to clipboard!");
        setShowShareMenu(false);
    };

    const getUrgencyConfig = (urgency: string) => {
        const configs = {
            Urgent: { color: "bg-red-500", text: "text-red-700", bg: "bg-red-50", border: "border-red-200", icon: <AlertCircle className="w-4 h-4" /> },
            High: { color: "bg-orange-500", text: "text-orange-700", bg: "bg-orange-50", border: "border-orange-200", icon: <AlertCircle className="w-4 h-4" /> },
            Medium: { color: "bg-yellow-500", text: "text-yellow-700", bg: "bg-yellow-50", border: "border-yellow-200", icon: <Clock className="w-4 h-4" /> },
            Low: { color: "bg-green-500", text: "text-green-700", bg: "bg-green-50", border: "border-green-200", icon: <CheckCircle className="w-4 h-4" /> }
        };
        return configs[urgency as keyof typeof configs] || configs.Medium;
    };

    const getStatusConfig = (status: string) => {
        const configs = {
            open: { label: "Open for Help", color: "bg-green-100 text-green-700", icon: <CheckCircle className="w-3 h-3" /> },
            "in-progress": { label: "In Progress", color: "bg-blue-100 text-blue-700", icon: <Clock className="w-3 h-3" /> },
            resolved: { label: "Resolved", color: "bg-gray-100 text-gray-700", icon: <CheckCircle className="w-3 h-3" /> }
        };
        return configs[status as keyof typeof configs] || configs.open;
    };

    if (loading) {
        return (
            <div className="flex items-center justify-center min-h-screen">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
            </div>
        );
    }

    if (!request) return null;

    const isCreator = userInfo?.id === request.createdBy?._id;
    const hasOffered = request.helpers?.some((h: any) => h._id === userInfo?.id);
    const isResolved = request.status === "resolved";
    const urgencyConfig = getUrgencyConfig(request.urgency);
    const statusConfig = getStatusConfig(request.status);
    const acceptedHelper = request.helpers?.find((h: any) => h.status === "accepted");
    const pendingHelpers = request.helpers?.filter((h: any) => h.status === "pending") || [];

    return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-purple-50/20 py-8 px-4">
            <div className="max-w-5xl mx-auto">
                {/* Header Actions */}
                <div className="flex justify-end gap-2 mb-4">
                    <div className="relative">
                        <button
                            onClick={() => setShowShareMenu(!showShareMenu)}
                            className="p-2 bg-white rounded-full shadow-sm hover:shadow-md transition-all"
                        >
                            <Share2 className="w-4 h-4 text-gray-600" />
                        </button>
                        {showShareMenu && (
                            <div className="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-10 animate-fade-in">
                                <button onClick={handleShare} className="w-full px-4 py-2 text-left text-sm hover:bg-gray-50 flex items-center gap-2">
                                    <Share2 className="w-4 h-4" />
                                    Copy link
                                </button>
                            </div>
                        )}
                    </div>
                    <button
                        onClick={() => setIsSaved(!isSaved)}
                        className="p-2 bg-white rounded-full shadow-sm hover:shadow-md transition-all"
                    >
                        <Heart className={`w-4 h-4 ${isSaved ? "fill-red-500 text-red-500" : "text-gray-600"}`} />
                    </button>
                </div>

                {/* Main Card */}
                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 animate-fade-in-up">
                    {/* Header Section */}
                    <div className="relative bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 px-8 py-8 overflow-hidden">
                        <div className="absolute inset-0 bg-black/20" />
                        <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-32 -mt-32" />
                        <div className="absolute bottom-0 left-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -ml-32 -mb-32" />

                        <div className="relative z-10">
                            <div className="flex flex-wrap gap-3 mb-4">
                                <span className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium ${urgencyConfig.bg} ${urgencyConfig.text} border ${urgencyConfig.border}`}>
                                    {urgencyConfig.icon}
                                    {request.urgency} Priority
                                </span>
                                <span className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium ${statusConfig.color} bg-white/20 backdrop-blur-sm border border-white/30`}>
                                    {statusConfig.icon}
                                    {statusConfig.label}
                                </span>
                                {request.category && (
                                    <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium bg-white/20 backdrop-blur-sm text-white border border-white/30">
                                        <Tag className="w-3 h-3" />
                                        {request.category}
                                    </span>
                                )}
                            </div>
                            <h1 className="text-3xl font-bold text-white mb-3">{request.title}</h1>
                            <p className="text-white/80 text-sm flex items-center gap-4 flex-wrap">
                                <span className="flex items-center gap-1">
                                    <Calendar className="w-4 h-4" />
                                    Posted {new Date(request.createdAt).toLocaleDateString()}
                                </span>
                                <span className="flex items-center gap-1">
                                    <Users className="w-4 h-4" />
                                    {request.helpers?.length || 0} offers
                                </span>
                            </p>
                        </div>
                    </div>

                    <div className="p-8 lg:p-10">
                        {/* Creator Profile Card */}
                        <div className="mb-8 bg-gradient-to-r from-gray-50 to-blue-50/30 rounded-2xl p-6 border border-gray-100">
                            <div className="flex flex-wrap justify-between items-start gap-4">
                                <div className="flex items-center gap-4">
                                    <div className="relative">
                                        <div className="w-16 h-16 rounded-full bg-gradient-to-r from-blue-500 to-purple-500 flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                                            {request.createdBy?.name?.charAt(0) || "U"}
                                        </div>
                                        <div className="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 rounded-full border-2 border-white"></div>
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-bold text-gray-900">{request.createdBy?.name}</h3>
                                        <div className="flex flex-wrap items-center gap-3 mt-1">
                                            <div className="flex items-center gap-1">
                                                <Star className="w-4 h-4 text-yellow-500 fill-yellow-500" />
                                                <span className="font-semibold text-gray-700">{request.createdBy?.trustScore}</span>
                                                <span className="text-sm text-gray-500">Trust Score</span>
                                            </div>
                                            {request.createdBy?.location && (
                                                <div className="flex items-center gap-1 text-sm text-gray-500">
                                                    <MapPin className="w-3 h-3" />
                                                    {request.createdBy.location}
                                                </div>
                                            )}
                                            <div className="flex items-center gap-1 text-sm text-gray-500">
                                                <Award className="w-3 h-3" />
                                                {request.createdBy?.totalHelpGiven || 0} helped
                                            </div>
                                        </div>
                                        {request.createdBy?.skills?.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5 mt-3">
                                                {request.createdBy.skills.slice(0, 3).map((skill: string) => (
                                                    <span key={skill} className="px-2 py-0.5 bg-white rounded-full text-xs text-gray-600 border border-gray-200">
                                                        {skill}
                                                    </span>
                                                ))}
                                                {request.createdBy.skills.length > 3 && (
                                                    <span className="px-2 py-0.5 text-xs text-gray-400">+{request.createdBy.skills.length - 3}</span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {!isCreator && !isResolved && (
                                    <button
                                        onClick={() => setShowMessageModal(true)}
                                        className="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-xl hover:shadow-md transition-all"
                                    >
                                        <MessageCircle className="w-4 h-4 text-purple-600" />
                                        <span className="text-sm font-medium">Message Requester</span>
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Description Section */}
                        <div className="mb-8">
                            <h2 className="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                                <FileText className="w-5 h-5 text-purple-600" />
                                Description
                            </h2>
                            <div className="prose max-w-none">
                                <p className="text-gray-700 leading-relaxed whitespace-pre-wrap">{request.description}</p>
                            </div>
                        </div>

                        {/* AI Insights Section */}
                        {request.aiSuggestions && (
                            <div className="mb-8 p-5 bg-gradient-to-r from-purple-50 to-blue-50 rounded-2xl border border-purple-100">
                                <div className="flex items-start gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-r from-purple-500 to-blue-500 flex items-center justify-center shadow-md">
                                        <Sparkles className="w-5 h-5 text-white" />
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="font-semibold text-gray-900 mb-2">AI Analysis</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                            <div className="bg-white rounded-xl p-3">
                                                <p className="text-xs text-gray-500 mb-1">Suggested Category</p>
                                                <p className="font-medium text-gray-800">{request.aiSuggestions.suggestedCategory}</p>
                                            </div>
                                            <div className="bg-white rounded-xl p-3">
                                                <p className="text-xs text-gray-500 mb-1">Detected Urgency</p>
                                                <p className="font-medium text-gray-800">{request.aiSuggestions.urgencyScore}</p>
                                            </div>
                                            <div className="bg-white rounded-xl p-3">
                                                <p className="text-xs text-gray-500 mb-1">Suggested Tags</p>
                                                <div className="flex flex-wrap gap-1">
                                                    {request.aiSuggestions.suggestedTags?.slice(0, 3).map((tag: string) => (
                                                        <span key={tag} className="px-2 py-0.5 bg-gray-100 rounded text-xs">#{tag}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tags Section */}
                        {request.tags?.length > 0 && (
                            <div className="mb-8">
                                <h3 className="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                                    <Tag className="w-4 h-4 text-gray-500" />
                                    Related Tags
                                </h3>
                                <div className="flex flex-wrap gap-2">
                                    {request.tags.map((tag: string) => (
                                        <span key={tag} className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-xl text-sm hover:bg-gray-200 transition-colors">
                                            #{tag}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Helpers Section - Enhanced with Accept/Decline */}
                        {(request.helpers?.length > 0 || isCreator) && (
                            <div className="mb-8">
                                <h3 className="font-semibold text-gray-900 mb-4 flex items-center gap-2">
                                    <Users className="w-5 h-5 text-green-600" />
                                    Helpers ({request.helpers?.length || 0})
                                </h3>

                                {/* Accepted Helper */}
                                {acceptedHelper && (
                                    <div className="mb-4 p-4 bg-green-50 rounded-2xl border border-green-200">
                                        <div className="flex items-center justify-between flex-wrap gap-3">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-green-500 to-emerald-500 flex items-center justify-center text-white font-bold">
                                                    {acceptedHelper.name?.charAt(0)}
                                                </div>
                                                <div>
                                                    <p className="font-semibold text-gray-900">{acceptedHelper.name}</p>
                                                    <p className="text-xs text-green-600 flex items-center gap-1">
                                                        <CheckCircle className="w-3 h-3" />
                                                        Accepted Helper
                                                    </p>
                                                </div>
                                            </div>
                                            {isCreator && !isResolved && (
                                                <button
                                                    onClick={() => window.location.href = `/messages?user=${acceptedHelper._id}`}
                                                    className="flex items-center gap-2 px-3 py-1.5 bg-white rounded-lg text-sm hover:shadow-md transition-all"
                                                >
                                                    <MessageCircle className="w-3 h-3" />
                                                    Message
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* Pending Helpers - Only visible to creator */}
                                {isCreator && pendingHelpers.length > 0 && (
                                    <div className="space-y-3">
                                        <p className="text-sm font-medium text-gray-700">Pending Applications ({pendingHelpers.length})</p>
                                        {pendingHelpers.map((helper: any) => (
                                            <div key={helper._id} className="p-4 bg-white rounded-xl border border-gray-200 hover:shadow-md transition-all">
                                                <div className="flex items-center justify-between flex-wrap gap-3">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full bg-gradient-to-r from-gray-500 to-gray-600 flex items-center justify-center text-white font-bold">
                                                            {helper.name?.charAt(0)}
                                                        </div>
                                                        <div>
                                                            <p className="font-semibold text-gray-900">{helper.name}</p>
                                                            <div className="flex items-center gap-2 text-xs text-gray-500">
                                                                <Star className="w-3 h-3 text-yellow-500" />
                                                                <span>Trust Score: {helper.trustScore || 70}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button
                                                            onClick={() => handleAcceptHelper(helper._id, helper.name)}
                                                            disabled={accepting === helper._id}
                                                            className="flex items-center gap-1.5 px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700 transition-colors disabled:opacity-50"
                                                        >
                                                            {accepting === helper._id ? (
                                                                <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />
                                                            ) : (
                                                                <Check className="w-3 h-3" />
                                                            )}
                                                            Accept
                                                        </button>
                                                        <button
                                                            onClick={() => handleDeclineHelper(helper._id, helper.name)}
                                                            disabled={declining === helper._id}
                                                            className="flex items-center gap-1.5 px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-300 transition-colors disabled:opacity-50"
                                                        >
                                                            {declining === helper._id ? (
                                                                <div className="w-4 h-4 border-2 border-gray-600 border-t-transparent rounded-full animate-spin" />
                                                            ) : (
                                                                <X className="w-3 h-3" />
                                                            )}
                                                            Decline
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Helper List for non-creators */}
                                {!isCreator && request.helpers?.length > 0 && (
                                    <div className="flex flex-wrap gap-2">
                                        {request.helpers.map((helper: any) => (
                                            <span key={helper._id} className="px-3 py-1.5 bg-green-100 text-green-700 rounded-xl text-sm">
                                                {helper.name}
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Action Buttons Section */}
                        {!isResolved && (
                            <div className="space-y-4">
                                {/* Main Action Buttons */}
                                <div className="flex flex-col sm:flex-row gap-4">
                                    {!isCreator && !hasOffered && request.status === "open" && (
                                        <button
                                            onClick={handleOfferHelp}
                                            disabled={offering}
                                            className="flex-1 py-3.5 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-xl font-semibold hover:shadow-xl transition-all disabled:opacity-50 flex items-center justify-center gap-2"
                                        >
                                            {offering ? (
                                                <>
                                                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin" />
                                                    Sending Offer...
                                                </>
                                            ) : (
                                                <>
                                                    <ThumbsUp className="w-5 h-5" />
                                                    Offer to Help
                                                </>
                                            )}
                                        </button>
                                    )}

                                    {isCreator && request.status !== "resolved" && (
                                        <button
                                            onClick={handleMarkSolved}
                                            disabled={solving}
                                            className="flex-1 py-3.5 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold hover:shadow-xl transition-all disabled:opacity-50 flex items-center justify-center gap-2"
                                        >
                                            {solving ? (
                                                <>
                                                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin" />
                                                    Marking...
                                                </>
                                            ) : (
                                                <>
                                                    <CheckCircle className="w-5 h-5" />
                                                    Mark as Solved
                                                </>
                                            )}
                                        </button>
                                    )}

                                    {hasOffered && !isCreator && request.status === "open" && (
                                        <div className="flex-1 text-center py-3.5 bg-amber-100 text-amber-700 rounded-xl font-medium flex items-center justify-center gap-2">
                                            <Clock className="w-5 h-5" />
                                            Awaiting Requester's Response
                                        </div>
                                    )}

                                    {acceptedHelper && acceptedHelper._id === userInfo?.id && !isResolved && (
                                        <div className="flex-1 text-center py-3.5 bg-green-100 text-green-700 rounded-xl font-medium flex items-center justify-center gap-2">
                                            <CheckCircle className="w-5 h-5" />
                                            You've been accepted! Start helping now.
                                        </div>
                                    )}
                                </div>

                                {/* Message Button for Accepted Helper */}
                                {acceptedHelper && acceptedHelper._id === userInfo?.id && !isResolved && (
                                    <button
                                        onClick={() => router.push(`/messages`)}
                                        className="w-full py-3 bg-white border-2 border-purple-600 text-purple-600 rounded-xl font-semibold hover:bg-purple-50 transition-all flex items-center justify-center gap-2"
                                    >
                                        <MessageCircle className="w-5 h-5" />
                                        Message Requester
                                    </button>
                                )}
                            </div>
                        )}

                        {/* Resolved Badge */}
                        {isResolved && (
                            <div className="text-center py-6 bg-gradient-to-r from-green-50 to-emerald-50 rounded-2xl border border-green-200">
                                <div className="inline-flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-full">
                                    <CheckCircle className="w-5 h-5" />
                                    <span className="font-semibold">This request has been resolved</span>
                                </div>
                                <p className="text-sm text-gray-600 mt-3">
                                    Thank you to everyone who helped make this possible!
                                </p>
                            </div>
                        )}
                    </div>
                </div>

                {/* Similar Requests Section */}
                <div className="mt-8">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4">Similar Requests You Might Like</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {/* You can add similar requests here */}
                        <div className="bg-white rounded-xl p-4 border border-gray-100 hover:shadow-md transition-all">
                            <p className="text-gray-500 text-sm">Loading similar requests...</p>
                        </div>
                    </div>
                </div>
            </div>

            {/* Message Modal */}
            {showMessageModal && (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl max-w-md w-full p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-bold text-gray-900">Message Requester</h3>
                            <button
                                onClick={() => setShowMessageModal(false)}
                                className="p-1 hover:bg-gray-100 rounded-lg transition-colors"
                            >
                                <X className="w-5 h-5" />
                            </button>
                        </div>
                        <textarea
                            value={messageText}
                            onChange={(e) => setMessageText(e.target.value)}
                            placeholder={`Ask ${request.createdBy?.name} about this request...`}
                            rows={4}
                            className="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 mb-4"
                        />
                        <div className="flex gap-3">
                            <button
                                onClick={() => setShowMessageModal(false)}
                                className="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium"
                            >
                                Cancel
                            </button>
                            <button
                                onClick={handleSendMessage}
                                disabled={sendingMessage || !messageText.trim()}
                                className="flex-1 py-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-lg font-medium disabled:opacity-50 flex items-center justify-center gap-2"
                            >
                                {sendingMessage ? (
                                    <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />
                                ) : (
                                    <>
                                        <Send className="w-4 h-4" />
                                        Send
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

// Helper component for FileText icon
function FileText(props: any) {
    return (
        <svg {...props} fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
    );
}